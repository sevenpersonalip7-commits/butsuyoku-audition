<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>物欲オーディション</title>
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#2E5395" />
<link rel="stylesheet" href="./css/style.css" />
<link rel="icon" href="./icons/icon-192.png" type="image/png" />
</head>
<body>

<header>
  <h1>物欲オーディション</h1>
  <div id="user-status"></div>
</header>

<main>
  <!-- ログイン前に表示するフォーム -->
  <section id="login-section" class="card hidden">
    <h2>ログイン</h2>
    <input type="email" id="email-input" placeholder="メールアドレス" autocomplete="email" />
    <input type="password" id="password-input" placeholder="パスワード" autocomplete="current-password" />
    <div class="button-row">
      <button id="signin-btn">ログイン</button>
    </div>
    <p id="auth-error" class="error hidden"></p>
  </section>

  <!-- ログイン後に表示する接続テストエリア -->
  <section id="app-section" class="card hidden">
    <h2>接続テスト</h2>
    <p>下のボタンで、itemsテーブルにテストデータを1件insertします。</p>
    <button id="test-insert-btn">テストアイテムを登録してみる</button>
    <button id="signout-btn" class="secondary">ログアウト</button>
    <p id="test-result"></p>
  </section>
</main>

<script type="module" src="./js/main.js"></script>

</body>
</html>
